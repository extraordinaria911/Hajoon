<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Poles Dictation Practice - Voice Input</title>
<style>
  :root {
    --ink:#1f2937; --muted:#667085; --line:#d0d5dd; --card:#ffffff; --bg:#f4f7fb;
    --blue:#1565c0; --yellow:#fff4a3; --red:#c62828; --green:#0f766e;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg); color:var(--ink);
  }
  .wrap { max-width:980px; margin:0 auto; padding:18px 14px 80px; }
  h1 { font-size:34px; margin:8px 0 4px; }
  .sub { color:var(--muted); margin-bottom:16px; font-size:17px; }
  .panel {
    background:var(--card); border:1px solid #e4e7ec; border-radius:18px;
    box-shadow:0 8px 24px rgba(16,24,40,.08); padding:16px; margin-bottom:16px;
  }
  .controls { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0; align-items:center; }
  button, select {
    font-size:16px; border-radius:12px; border:1px solid #cbd5e1;
    padding:10px 12px; background:#fff;
  }
  button.primary { background:#263238; color:white; border-color:#263238; }
  button.blue { background:var(--blue); color:#fff; border-color:var(--blue); }
  button.green { background:var(--green); color:white; border-color:var(--green); }
  button:active { transform:translateY(1px); }
  .notice { font-size:15px; color:#475467; line-height:1.55; }
  .sentence { border-top:1px solid #eaecf0; padding:18px 0; }
  .sentence:first-child { border-top:0; }
  .label { font-size:15px; color:var(--muted); margin-bottom:8px; }
  .text {
    font-size:29px; line-height:1.75; letter-spacing:.01em;
    font-family:Georgia,"Times New Roman",serif;
  }
  .boxtext {
    color:var(--blue); border:2px solid #a9c8f5; background:#f0f7ff;
    padding:14px; border-radius:16px; font-size:27px; font-weight:700;
  }
  .analyze {
    color:var(--blue); border:2px solid #9bbcf0; background:#eef6ff;
    padding:14px; border-radius:16px; font-size:25px; font-weight:800;
  }
  .word { padding:2px 4px; border-radius:7px; display:inline-block; }
  .word.active { background:var(--yellow); color:#111827; }
  textarea {
    width:100%; min-height:90px; border:1px solid var(--line); border-radius:14px;
    padding:12px; font-size:22px; line-height:1.45; margin-top:10px;
  }
  textarea.listening { outline:3px solid #f59e0b; background:#fffbeb; }
  .voice-status { font-size:14px; color:var(--muted); margin-top:6px; }
  .voice-status.on { color:#b45309; font-weight:800; }
  .voice-status.error { color:#c62828; font-weight:800; }
  .result {
    display:none; margin-top:10px; background:#f8fafc; border:1px solid #e2e8f0;
    border-radius:14px; padding:12px; font-size:18px; line-height:1.6;
  }
  .ok { color:var(--blue); font-weight:800; }
  .bad { color:var(--red); font-weight:800; }
  .small { font-size:14px; color:var(--muted); }
  .modebar { position:sticky; top:0; z-index:10; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Poles Dictation Practice</h1>
  <div class="sub">TTS 듣기, 쉐도잉, 받아쓰기 확인, 음성 입력 연습 페이지</div>

  <div class="panel notice">
    글 쓰는 칸을 누르면 바로 음성 인식을 시작합니다. 마이크 표시가 뜬 뒤 문장을 읽으세요.
    음성 인식은 <b>HTTPS 주소</b>에서 가장 안정적으로 작동합니다.
  </div>

  <div class="panel modebar">
    <div class="controls">
      <button class="primary" onclick="readAll()">TTS 전체 듣기</button>
      <button class="blue" onclick="startShadowing()">쉐도잉 모드 시작</button>
      <button onclick="stopTTS()">멈추기</button>
      <button onclick="toggleAnswers()">본문 보이기/가리기</button>
      <button onclick="clearAll()">전체 지우기</button>
      <select id="rate">
        <option value="0.45">아주 천천히</option>
        <option value="0.58" selected>어린이 속도</option>
        <option value="0.72">보통보다 느리게</option>
        <option value="0.9">보통</option>
      </select>
      <select id="shadowRepeat">
        <option value="1">쉐도잉 1회</option>
        <option value="2" selected>쉐도잉 2회</option>
        <option value="3">쉐도잉 3회</option>
      </select>
    </div>
  </div>

  <div class="panel" id="list"></div>
</div>

<script>

"text": "This ice is slowly moving, inching from the middle of the Arctic and Antarctica to their coasts."}, {"type": "main", "text": "By the time pieces break off into the ocean and become icebergs, the ice is 100,000 years old."}, {"type": "main", "text": "People fly thousands of miles to reach the Poles."}, {"type": "main", "text": "And when the winds kick up and blow the snow around, it’s hard to know where the sky ends and the land begins."}, {"type": "main", "text": "Pilots say that it’s like flying inside a Ping-Pong ball."}, {"type": "main", "text": "Many of the instruments normally used to guide planes won’t work there."}, {"type": "main", "text": "In fact, navigators flying to the Poles are the only ones left in the U.S. Air Force who still help map their route with the stars."}, {"type": "main", "text": "This is some of the hardest flying there is."}, {"type": "analyze", "text": "ANALYZE THE TEXT — Literal and Nonliteral Meanings: What do the pilots mean when they say that flying in the Poles is like flying inside a Ping-Pong ball?"}, {"type": "main", "text": "Planes do not land in these wintry worlds by rolling down concrete runways."}, {"type": "main", "text": "They use skis instead."}, {"type": "main", "text": "And they slide like giant sleds until they stop."}, {"type": "main", "text": "Gliding along, the skis get so hot that they melt the snow they’re resting on."}, {"type": "main", "text": "Pilots must pull them up when the planes stop."}, {"type": "main", "text": "Otherwise, the wet snow would refreeze on the skis and the planes would be stuck to the ground."}, {"type": "box", "text": "When pilots land at the South Pole, they keep their engines running. It’s so cold that they might not start up again."}, {"type": "main", "text": "It sounds like an adventure story, doesn’t it?"}, {"type": "main", "text": "It is an adventure story—one with science."}, {"type": "main", "text": "Scientists are today’s explorers, braving the wilderness to learn more about our world."}, {"type": "main", "text": "The snow near the North Pole, for example, hasn’t melted since the last ice age."}, {"type": "main", "text": "Over 100,000 years of it has been pressed into an ice sheet almost 2 miles (3.2 km) thick."}, {"type": "main", "text": "But each layer looks separate, like the rings of a tree."}, {"type": "main", "text": "Some scientists use this snow to measure air pollution."}, {"type": "main", "text": "Others are drilling through this ice to pull out history."}, {"type": "main", "text": "Each sample they bring up tells a story about the time when it was formed."}, {"type": "main", "text": "Scientists have found volcanic ash from Italy’s Mount Vesuvius, for instance, and pollution from ancient Roman times."}, {"type": "main", "text": "Scientists began this experiment to learn more about how ice ages begin and end."}, {"type": "main", "text": "Before, they thought our climate needed thousands of years to change."}, {"type": "main", "text": "Now they know it can happen much, much faster."}, {"type": "main", "text": "At the South Pole some scientists search for meteorites, rocks from outer space."}, {"type": "main", "text": "Meteorites are no more likely to fall there than anywhere else on Earth."}, {"type": "main", "text": "But, as one scientist explains, if you want to find something dark, it’s easier to look on a big white sheet."}, {"type": "main", "text": "His team has given thousands of meteorites to our space agency, the National Aeronautics and Space Administration (NASA), for study."}, {"type": "main", "text": "The Antarctic sky is a perfect window to the stars, the best on this planet."}, {"type": "main", "text": "It is very clear because it’s so cold and dry—and has a night that is six months long."}, {"type": "main", "text": "Some scientists use telescopes to study the age of the universe."}, {"type": "main", "text": "Others fly balloons to measure rays coming in from outer space."}, {"type": "main", "text": "At the Poles people wear many layers of clothing to keep warmth in and wind out."}, {"type": "main", "text": "They wear big boots and overalls called fat-boy pants."}, {"type": "main", "text": "Their mittens have furry backs to wipe their noses and warm their ears."}, {"type": "main", "text": "They also wear goggles."}, {"type": "main", "text": "Without them, their eyes would get sunburned and temporarily blinded by the strong light bouncing off the snow."}, {"type": "box", "text": "No wearing rings, earrings, or sunglasses with metal frames in the extreme cold. Metal gets so cold that it will freeze any skin that it touches."}, {"type": "box", "text": "The body is like a furnace that needs fuel to keep running. It works so hard to stay warm at the poles that people end up eating at least twice as much food as usual."}, {"type": "main", "text": "People who work at the Poles must learn how to survive being stuck outdoors."}, {"type": "main", "text": "On an unexpected “camping trip,” they first build a quick shelter to get out of the wind."}, {"type": "main", "text": "Then they build a better one and pack in close to one another, using body heat to stay warm."}, {"type": "main", "text": "Building shelters—doing any work—is much harder in extreme cold."}, {"type": "main", "text": "Mittens are very bulky, but it’s unsafe to go bare-handed for long."}, {"type": "main", "text": "Getting too cold is dangerous, but so is getting overheated."}, {"type": "main", "text": "Sweat can freeze into a layer of ice next to your body."}, {"type": "main", "text": "In summer many people live at the science stations in the Arctic and Antarctica."}, {"type": "main", "text": "They have a gym and videos and spend their spare time skiing on the icy runways."}, {"type": "main", "text": "But mostly they work hard, getting as much done as possible while the weather is warm enough for planes to fly in and out."}, {"type": "main", "text": "A few of them stay all winter long."}, {"type": "main", "text": "Scientists say that summer’s constant daylight tricks your body into wanting to keep going without rest."}, {"type": "main", "text": "But in winter’s endless darkness, you feel tired much of the time."}, {"type": "main", "text": "One scientist even studies the people who winter-over at the South Pole."}, {"type": "main", "text": "He wants to know what kind of person works well in such a small, isolated group."}, {"type": "main", "text": "Someday his findings may help pick the people to live in a colony on Mars."}, {"type": "box", "text": "Unlike most refrigerators, the one containing fruit and vegetables at the South Pole is heated."}, {"type": "main", "text": "In spring in Antarctica, the temperature finally climbs up to +10°F (−10°C) and it’s warm enough for planes to fly in again."}, {"type": "main", "text": "The scientists are eager to get on board and return to the colors and smells of the “green world.” Once they buckle up, there is one last frosty problem to solve."}, {"type": "main", "text": "The airplane must go 100 miles (160 km) per hour to take off, no easy task when sliding over ice."}, {"type": "main", "text": "Sometimes pilots must travel 2 miles (3 km) to reach that speed."}, {"type": "main", "text": "And sometimes they need extra help."}, {"type": "main", "text": "Then they turn to the eight rockets attached to their plane."}, {"type": "main", "text": "A flick of the switch, a burst of flames and speed, and they are on their way home."}];

let currentIndex = null;
let hideText = false;
let activeRecognition = null;
let activeTextarea = null;

function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
}

function words(text) {
  return String(text || "").match(/\S+/g) || [];
}

function renderText(item, i) {
  const cls = item.type === "box" ? "boxtext" : item.type === "analyze" ? "analyze" : "text";
  if (hideText && item.type === "main") {
    return `<div class="${cls}" id="text-${i}">본문 가림</div>`;
  }
  const content = words(item.text).map((w, k) => `<span class="word" id="w-${i}-${k}">${escapeHtml(w)}</span>`).join(" ");
  return `<div class="${cls}" id="text-${i}">${content}</div>`;
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = items.map((item, i) => `
    <div class="sentence">
      <div class="label">${i+1}. ${item.type === "analyze" ? "Analyze the Text" : item.type === "box" ? "Box Text" : "Main Text"}</div>
      ${renderText(item, i)}
      <div class="controls">
        <button class="blue" onclick="readOne(${i})">TTS 문장 듣기</button>
        <button onclick="readOneSlow(${i})">천천히</button>
        <button onclick="check(${i})">정답 확인</button>
        <button onclick="clearOne(${i})">지우기</button>
      </div>
      <textarea id="a-${i}" placeholder="여기를 누르면 바로 음성 인식이 시작됩니다. 직접 타이핑도 가능합니다." onclick="startVoiceInput(${i})" onfocus="startVoiceInput(${i})"></textarea>
      <div class="voice-status" id="v-${i}">칸을 누르면 음성 입력 시작</div>
      <div class="result" id="r-${i}"></div>
    </div>
  `).join("");
}

function normalize(s) {
  return (s || "")
    .replace(/[−–—]/g, "-")
    .replace(/[“”]/g, '"')
    .replace(/[‘’]/g, "'")
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();
}

function normalizeForScore(s) {
  return (s || "")
    .replace(/[−–—]/g, "-")
    .replace(/[“”]/g, '"')
    .replace(/[‘’]/g, "'")
    .replace(/°/g, "")
    .toLowerCase()
    .replace(/[.,!?;:"'“”‘’()[\]{}]/g, "")
    .replace(/[-—–]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function cleanToken(s) {
  return normalizeForScore(s);
}

function check(i) {
  const target = items[i].text;
  const user = document.getElementById(`a-${i}`).value;
  const tw = words(target).map(cleanToken);
  const uw = words(user).map(cleanToken);
  let same = 0;
  const marked = words(target).map((w, k) => {
    const ok = cleanToken(w) === (uw[k] || "");
    if (ok) same++;
    return `<span class="${ok ? "ok" : "bad"}">${escapeHtml(w)}</span>`;
  }).join(" ");
  const score = tw.length ? Math.round(same / tw.length * 100) : 0;
  const exact = normalizeForScore(target) === normalizeForScore(user);
  const r = document.getElementById(`r-${i}`);
  r.style.display = "block";
  r.innerHTML = `
    <div>${exact ? '<span class="ok">정확합니다.</span>' : '<span class="bad">확인이 필요합니다.</span>'} 일치율: ${score}%</div>
    <div class="small">파란색은 위치와 단어가 맞은 부분, 빨간색은 확인할 부분입니다. 문장부호는 점수에서 제외됩니다.</div>
    <div>${marked}</div>
    <div style="margin-top:8px;"><b>정답:</b> ${escapeHtml(target)}</div>
  `;
}

function clearOne(i) {
  stopVoiceInput();
  document.getElementById(`a-${i}`).value = "";
  document.getElementById(`r-${i}`).style.display = "none";
  document.getElementById(`v-${i}`).textContent = "칸을 누르면 음성 입력 시작";
  document.getElementById(`v-${i}`).className = "voice-status";
}

function clearAll() {
  items.forEach((_, i) => clearOne(i));
}

function toggleAnswers() {
  hideText = !hideText;
  render();
}

function stopTTS() {
  speechSynthesis.cancel();
  clearHighlights();
}

function clearHighlights() {
  document.querySelectorAll(".word.active").forEach(e => e.classList.remove("active"));
}

function speakItem(i, rate) {
  stopTTS();
  currentIndex = i;
  const text = items[i].text;
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = "en-US";
  utt.rate = rate;
  utt.pitch = 1;
  utt.onboundary = (event) => {
    if (event.name !== "word") return;
    const before = text.slice(0, event.charIndex);
    const idx = words(before).length;
    clearHighlights();
    const el = document.getElementById(`w-${i}-${idx}`);
    if (el) el.classList.add("active");
  };
  utt.onend = () => clearHighlights();
  speechSynthesis.speak(utt);
}

function readOne(i) {
  speakItem(i, Number(document.getElementById("rate").value || 0.82));
}

function readOneSlow(i) {
  speakItem(i, 0.6);
}

function wait(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function speakPromise(i, rate) {
  return new Promise(resolve => {
    stopTTS();
    const text = items[i].text;
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = "en-US";
    utt.rate = rate;
    utt.pitch = 1;
    utt.onboundary = (event) => {
      if (event.name !== "word") return;
      const before = text.slice(0, event.charIndex);
      const idx = words(before).length;
      clearHighlights();
      const el = document.getElementById(`w-${i}-${idx}`);
      if (el) el.classList.add("active");
    };
    utt.onend = () => {
      clearHighlights();
      resolve();
    };
    speechSynthesis.speak(utt);
  });
}

async function startShadowing() {
  const repeat = Number(document.getElementById("shadowRepeat").value || 2);
  const rate = Number(document.getElementById("rate").value || 0.58);

  for (let i = 0; i < items.length; i++) {
    if (items[i].type === "analyze") continue;
    const block = document.getElementById(`text-${i}`);
    if (block) block.scrollIntoView({ behavior: "smooth", block: "center" });
    for (let r = 0; r < repeat; r++) {
      await speakPromise(i, rate);
      await wait(900);
    }
    const wordCount = words(items[i].text).length;
    const pause = Math.min(7000, Math.max(1800, wordCount * 320));
    await wait(pause);
  }
}

function readAll() {
  let idx = 0;
  function next() {
    if (idx >= items.length) return;
    const text = items[idx].text;
    stopTTS();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = "en-US";
    utt.rate = Number(document.getElementById("rate").value || 0.82);
    utt.onboundary = (event) => {
      if (event.name !== "word") return;
      const before = text.slice(0, event.charIndex);
      const widx = words(before).length;
      clearHighlights();
      const el = document.getElementById(`w-${idx}-${widx}`);
      if (el) el.classList.add("active");
    };
    utt.onend = () => {
      clearHighlights();
      idx++;
      setTimeout(next, 300);
    };
    speechSynthesis.speak(utt);
  }
  next();
}

function stopVoiceInput() {
  if (activeRecognition) {
    try {
      activeRecognition.onresult = null;
      activeRecognition.onerror = null;
      activeRecognition.onend = null;
      activeRecognition.stop();
    } catch(e) {}
  }
  if (activeTextarea) {
    activeTextarea.classList.remove("listening");
  }
  activeRecognition = null;
  activeTextarea = null;
}

function startVoiceInput(i) {
  const textarea = document.getElementById(`a-${i}`);
  const status = document.getElementById(`v-${i}`);
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SR) {
    status.textContent = "이 브라우저는 음성 인식을 지원하지 않습니다. 직접 입력하세요.";
    status.className = "voice-status error";
    return;
  }

  if (activeTextarea === textarea) return;

  stopVoiceInput();
  stopTTS();

  const rec = new SR();
  activeRecognition = rec;
  activeTextarea = textarea;

  rec.lang = "en-US";
  rec.interimResults = true;
  rec.continuous = false;
  rec.maxAlternatives = 1;

  let finalText = "";
  let interimText = "";

  textarea.classList.add("listening");
  status.textContent = "0.5초 뒤 듣기 시작합니다. 마이크 표시가 뜬 뒤 읽으세요.";
  status.className = "voice-status on";

  rec.onstart = () => {
    status.textContent = "듣는 중입니다. 문장을 소리 내어 읽으세요.";
    status.className = "voice-status on";
  };

  rec.onresult = (e) => {
    interimText = "";
    for (let n = e.resultIndex; n < e.results.length; n++) {
      const txt = e.results[n][0].transcript;
      if (e.results[n].isFinal) finalText += txt + " ";
      else interimText += txt + " ";
    }
    const shown = (finalText + interimText).trim();
    if (shown) textarea.value = shown;
  };

  rec.onerror = (e) => {
    const err = e.error || "unknown";
    if (err === "not-allowed" || err === "service-not-allowed") {
      status.textContent = "마이크 권한이 차단되었습니다. HTTPS 주소에서 열고 Chrome 마이크 권한을 허용하세요.";
    } else if (err === "aborted") {
      status.textContent = "음성 인식이 중간에 끊겼습니다. 칸을 다시 누르고 마이크 표시 뒤 읽으세요.";
    } else if (err === "no-speech") {
      status.textContent = "소리를 인식하지 못했습니다. 더 크게, 천천히 읽어 보세요.";
    } else {
      status.textContent = "음성 인식 오류: " + err;
    }
    status.className = "voice-status error";
  };

  rec.onend = () => {
    textarea.classList.remove("listening");
    if ((finalText + interimText).trim()) {
      status.textContent = "입력 완료. 필요하면 정답 확인을 누르세요.";
      status.className = "voice-status";
      check(i);
    } else if (!status.classList.contains("error")) {
      status.textContent = "인식된 문장이 없습니다. 칸을 다시 눌러 주세요.";
      status.className = "voice-status error";
    }
    if (activeRecognition === rec) {
      activeRecognition = null;
      activeTextarea = null;
    }
  };

  setTimeout(() => {
    try {
      rec.start();
    } catch(e) {
      textarea.classList.remove("listening");
      status.textContent = "음성 인식을 시작하지 못했습니다. 잠시 뒤 다시 눌러 주세요.";
      status.className = "voice-status error";
      activeRecognition = null;
      activeTextarea = null;
    }
  }, 500);
}

render();
</script>
</body>
</html>
